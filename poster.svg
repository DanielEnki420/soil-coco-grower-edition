<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" width="1200" height="780">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1a0a"/>
      <stop offset="50%" stop-color="#0f2414"/>
      <stop offset="100%" stop-color="#0a1a0a"/>
    </linearGradient>
    <linearGradient id="gradSoil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#166534"/>
    </linearGradient>
    <linearGradient id="gradDWC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </linearGradient>
    <linearGradient id="gradGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Arc path for curved "CANNA COMMUNITY" text -->
    <path id="topArc" d="M 522,108 A 78,78 0 0 0 678,108"/>
  </defs>

  <!-- Background -->
  <rect width="1200" height="780" fill="url(#bg)"/>

  <!-- Decorative leaves (subtle, repositioned away from center logo) -->
  <g opacity="0.06" fill="#4ade80">
    <circle cx="80"  cy="150" r="80"/>
    <circle cx="1120" cy="660" r="90"/>
    <circle cx="130" cy="640" r="60"/>
    <circle cx="1080" cy="180" r="70"/>
  </g>

  <!-- ══════════════════════════════════════════════════
       CANNA COMMUNITY GERMANY LOGO (centered at 600,108)
       ══════════════════════════════════════════════════ -->
  <g transform="translate(600,108)" filter="url(#goldGlow)">

    <!-- Shield outer fill -->
    <path d="M0,-92 C50,-92 82,-70 82,-38 L82,24 C82,66 48,92 0,104 C-48,92 -82,66 -82,24 L-82,-38 C-82,-70 -50,-92 0,-92 Z"
          fill="#0d1500" stroke="url(#gradGold)" stroke-width="4.5"/>

    <!-- Shield inner decorative border -->
    <path d="M0,-80 C43,-80 70,-60 70,-32 L70,20 C70,57 40,80 0,91 C-40,80 -70,57 -70,20 L-70,-32 C-70,-60 -43,-80 0,-80 Z"
          fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.45"/>

    <!-- Cannabis leaf — 7 elliptic fingers from center -->
    <g fill="#f59e0b" opacity="0.95">
      <!-- Center finger (straight up) -->
      <g transform="rotate(0)">  <ellipse cx="0" cy="-20" rx="4.5" ry="21"/></g>
      <!-- ±27° -->
      <g transform="rotate(27)"> <ellipse cx="0" cy="-18" rx="4"   ry="18"/></g>
      <g transform="rotate(-27)"><ellipse cx="0" cy="-18" rx="4"   ry="18"/></g>
      <!-- ±52° -->
      <g transform="rotate(52)"> <ellipse cx="0" cy="-14" rx="3.5" ry="15"/></g>
      <g transform="rotate(-52)"><ellipse cx="0" cy="-14" rx="3.5" ry="15"/></g>
      <!-- ±76° -->
      <g transform="rotate(76)"> <ellipse cx="0" cy="-10" rx="2.8" ry="11"/></g>
      <g transform="rotate(-76)"><ellipse cx="0" cy="-10" rx="2.8" ry="11"/></g>
      <!-- Stem -->
      <rect x="-2" y="0" width="4" height="20" rx="2"/>
    </g>

    <!-- Stars -->
    <text x="-42" y="-32" text-anchor="middle" font-size="11" fill="#fde68a">✦</text>
    <text x="42"  y="-32" text-anchor="middle" font-size="11" fill="#fde68a">✦</text>
    <text x="-55" y="4"  text-anchor="middle" font-size="8"  fill="#fbbf24">✦</text>
    <text x="55"  y="4"  text-anchor="middle" font-size="8"  fill="#fbbf24">✦</text>
    <text x="0"   y="28" text-anchor="middle" font-size="8"  fill="#fbbf24">✦</text>

    <!-- Divider line above GERMANY -->
    <line x1="-44" y1="36" x2="44" y2="36" stroke="#fbbf24" stroke-width="1" opacity="0.7"/>

    <!-- GERMANY -->
    <text x="0" y="52" text-anchor="middle"
          font-family="Arial Black, Arial, sans-serif"
          font-size="17" font-weight="900"
          fill="url(#gradGold)" letter-spacing="3">GERMANY</text>

    <!-- Divider line below GERMANY -->
    <line x1="-44" y1="58" x2="44" y2="58" stroke="#fbbf24" stroke-width="1" opacity="0.7"/>

    <!-- EST.2025 -->
    <text x="0" y="74" text-anchor="middle"
          font-family="Arial, sans-serif" font-size="10" font-weight="bold"
          fill="#d97706" letter-spacing="2">EST.2025</text>

  </g>

  <!-- Curved "CANNA COMMUNITY" text along top arc of shield -->
  <text font-family="Arial Black, Arial, sans-serif" font-size="10.5" font-weight="900"
        fill="#fde68a" letter-spacing="2.5">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">CANNA COMMUNITY</textPath>
  </text>

  <!-- ══════════════════════════════════════════════════
       TITLE
       ══════════════════════════════════════════════════ -->
  <text x="600" y="250" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="42" font-weight="900" fill="#f0fdf4" filter="url(#glow)">
    🌱 GROWER EDITION TOOLS
  </text>
  <text x="600" y="284" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="18" fill="#a7f3d0" letter-spacing="4">
    KOSTENLOS · OFFLINE · OPEN SOURCE
  </text>
  <text x="600" y="318" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="20" fill="#86efac" font-style="italic">
    Zwei Schwester-Tools. Ein Ziel: dein perfekter Grow.
  </text>

  <!-- ══════════════════════════════════════════════════
       LEFT CARD: Soil &amp; Coco
       ══════════════════════════════════════════════════ -->
  <g transform="translate(60, 345)">
    <rect width="510" height="380" rx="20" fill="#0a1a0a" stroke="url(#gradSoil)" stroke-width="3"/>
    <text x="30" y="55" font-family="Arial, sans-serif" font-size="32" font-weight="900" fill="#4ade80">🌍 SOIL &amp; COCO</text>
    <text x="30" y="85" font-family="Arial, sans-serif" font-size="18" fill="#a7f3d0">Grower Edition</text>

    <line x1="30" y1="110" x2="480" y2="110" stroke="#166534" stroke-width="1"/>

    <text x="30" y="145" font-family="Arial, sans-serif" font-size="15" fill="#d1fae5">Für Erde &amp; Coco-Grower</text>
    <text x="30" y="180" font-family="Arial, sans-serif" font-size="14" fill="#86efac">✓ 25 Dünger-Marken im Kalkulator</text>
    <text x="30" y="205" font-family="Arial, sans-serif" font-size="14" fill="#86efac">✓ pH · EC · Temperatur-Tracking</text>
    <text x="30" y="230" font-family="Arial, sans-serif" font-size="14" fill="#86efac">✓ Runoff-Monitoring (Salz-Check)</text>
    <text x="30" y="255" font-family="Arial, sans-serif" font-size="14" fill="#86efac">✓ Gieß- &amp; Nährstoff-Erinnerung</text>
    <text x="30" y="280" font-family="Arial, sans-serif" font-size="14" fill="#86efac">✓ Grow-Tagebuch mit Chart</text>
    <text x="30" y="305" font-family="Arial, sans-serif" font-size="14" fill="#86efac">✓ Gemini KI-Assistent</text>

    <rect x="30" y="325" width="450" height="40" rx="8" fill="#166534"/>
    <text x="255" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#f0fdf4">danielenki420.github.io/soil-coco-grower-edition</text>
  </g>

  <!-- ══════════════════════════════════════════════════
       RIGHT CARD: DWC
       ══════════════════════════════════════════════════ -->
  <g transform="translate(630, 345)">
    <rect width="510" height="380" rx="20" fill="#0a1a1f" stroke="url(#gradDWC)" stroke-width="3"/>
    <text x="30" y="55" font-family="Arial, sans-serif" font-size="32" font-weight="900" fill="#38bdf8">💧 DWC</text>
    <text x="30" y="85" font-family="Arial, sans-serif" font-size="18" fill="#bae6fd">Grower Edition</text>

    <line x1="30" y1="110" x2="480" y2="110" stroke="#0c4a6e" stroke-width="1"/>

    <text x="30" y="145" font-family="Arial, sans-serif" font-size="15" fill="#e0f2fe">Für Hydroponik / DWC-Grower</text>
    <text x="30" y="180" font-family="Arial, sans-serif" font-size="14" fill="#7dd3fc">✓ 13 Hydro-Marken in der Bibliothek</text>
    <text x="30" y="205" font-family="Arial, sans-serif" font-size="14" fill="#7dd3fc">✓ pH · EC · Temp · ORP-Alerts</text>
    <text x="30" y="230" font-family="Arial, sans-serif" font-size="14" fill="#7dd3fc">✓ EC-Nachfüll-Rechner</text>
    <text x="30" y="255" font-family="Arial, sans-serif" font-size="14" fill="#7dd3fc">✓ Wasserwechsel-Erinnerung</text>
    <text x="30" y="280" font-family="Arial, sans-serif" font-size="14" fill="#7dd3fc">✓ Ernte-Countdown</text>
    <text x="30" y="305" font-family="Arial, sans-serif" font-size="14" fill="#7dd3fc">✓ 6 Sprachen + Gemini KI</text>

    <rect x="30" y="325" width="450" height="40" rx="8" fill="#0c4a6e"/>
    <text x="255" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#f0f9ff">danielenki420.github.io/dwc-grower-edition</text>
  </g>

  <!-- Footer -->
  <text x="600" y="758" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#64748b">
    Single HTML · Vanilla JS · MIT License · Made with ☕ by DanielEnki420
  </text>
</svg>
